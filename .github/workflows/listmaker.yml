name: listmaker

on:
  schedule:
    # 04:00 UTC diario
    - cron: "0 4 * * *"
  workflow_dispatch:

# Solo un run a la vez. Si llega cron mientras ya corre, lo ignoramos.
concurrency:
  group: listmaker
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 330  # ~5.5h, deja margen al límite de 6h del runner

    env:
      # OAuth user credentials (preferidas — necesario para crear archivos en Drive personal)
      GDRIVE_OAUTH_CLIENT_ID: ${{ secrets.GDRIVE_OAUTH_CLIENT_ID }}
      GDRIVE_OAUTH_CLIENT_SECRET: ${{ secrets.GDRIVE_OAUTH_CLIENT_SECRET }}
      GDRIVE_OAUTH_REFRESH_TOKEN: ${{ secrets.GDRIVE_OAUTH_REFRESH_TOKEN }}
      # Service Account (fallback, opcional)
      GDRIVE_SA_JSON: ${{ secrets.GDRIVE_SA_JSON }}
      # Resto
      QQ_COOKIES_B64: ${{ secrets.QQ_COOKIES_B64 }}
      ARTISTS_TXT_B64: ${{ secrets.ARTISTS_TXT_B64 }}
      ARTISTS_FOLDER_ID: ${{ secrets.ARTISTS_FOLDER_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ubuntu-latest ya trae Google Chrome instalado.
      # Selenium 4.15+ usa Selenium Manager y descarga chromedriver solo.
      - name: Verify Chrome
        run: google-chrome --version

      - name: Download state from Drive
        id: download
        run: python scripts/download.py

      # Continue-on-error: aunque scrape falle (p.ej. rate-limit, exit 3), el entry point ya
      # ejecuta save_and_compare_history en el finally, así que deltas.jsonl/history.json
      # pueden tener cambios valiosos. Queremos que upload siga corriendo para persistirlos.
      - name: Scrape QQ
        id: scrape
        continue-on-error: true
        run: python scripts/scrape.py

      - name: Generate PDFs
        if: steps.scrape.outcome == 'success'
        id: write
        continue-on-error: true
        run: python scripts/write.py

      # Solo subimos si download fue OK; si no, el estado local está vacío/corrupto
      # y subirlo borraría datos buenos en Drive.
      - name: Upload state to Drive
        if: steps.download.outcome == 'success'
        run: python scripts/upload.py

      # Si scrape o write fallaron, marca el job como failed (después del upload, para
      # que GH Actions mande el email automático al owner del repo).
      - name: Mark job failed if any stage failed
        if: steps.scrape.outcome == 'failure' || steps.write.outcome == 'failure'
        run: |
          echo "scrape outcome: ${{ steps.scrape.outcome }}"
          echo "write outcome: ${{ steps.write.outcome }}"
          exit 1

      - name: Upload failure report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failed-artists
          path: |
            lists/failed_artists.json
            lists/deltas.jsonl
          if-no-files-found: ignore
          retention-days: 30
